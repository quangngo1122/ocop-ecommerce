"""
Lịch sử thay đổi sản phẩm
"""
type ProductAuditLog {
  _id: ID!
  product_id: ID!
  variant_id: ID
  action_type: String!
  changes: [ProductAuditLogChange!]!
  createdAt: DateTime!
}

type ProductAuditLogChange {
  field: String!
  old_value: String
  new_value: String
}

extend type Query {
  productAuditLogs(
    productId: ID!
    variantId: ID
    limit: Int
    offset: Int
  ): [ProductAuditLog!]!
}
